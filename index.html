        /* default */
        .n01, .n10, .n11, .plusb, .minb, .mulb, .divb, .eqb {

        .n0_0 > :checked ~ div .gay button .n00 {

        }
        
        .n0_0 > :checked ~ div .gay button .n01, .n0_0 > :checked ~ div .chink button label {
